[window]
padding = { x = 16, y = 16 }
dynamic_padding = true
opacity = 0.95
blur = true

[terminal.shell]
program = "/run/current-system/sw/bin/fish"

[font]
normal = { family = "CommitMono Nerd Font", style = "Regular" }
bold = { family = "CommitMono Nerd Font", style = "Bold" }
size = 10.0

# [font.offset]
# y = 4 # Adjusting to match your line-height preference

[cursor]
style = { shape = "Beam", blinking = "Never" }

[debug]
renderer = "Gles2Pure"

[colors.primary]
background = "#111111"
foreground = "#CCCCCC"

[colors.cursor]
cursor = "#CCCCCC"
text = "#111111"

[colors.normal]
black   = "#333333"
red     = "#EA4335"
green   = "#34A853"
yellow  = "#FBBC04"
blue    = "#4285F4"
magenta = "#A142F4"
cyan    = "#4285F4"
white   = "#CCCCCC"

[colors.bright]
black   = "#555555"
red     = "#EA4335"
green   = "#34A853"
yellow  = "#FBBC04"
blue    = "#4285F4"
magenta = "#A142F4"
cyan    = "#4285F4"
white   = "#CCCCCC"
